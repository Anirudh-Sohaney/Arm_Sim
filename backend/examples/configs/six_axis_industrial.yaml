  - { name: "wrist_roll", axis: "z", link_length: 0, angle_min: -180, angle_max: 180 }
  - { name: "wrist_pitch", axis: "pitch", link_length: 8, angle_min: -90, angle_max: 90 }
  - { name: "wrist_yaw", axis: "yaw", link_length: 5, angle_min: -180, angle_max: 180 }
